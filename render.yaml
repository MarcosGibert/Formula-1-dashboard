services:
  - type: web
    name: f1-dashboard-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        # Change to your GitHub Pages origin, e.g. https://<user>.github.io
        value: "*"
      - key: CACHE_DB_PATH
        value: /tmp/cache.db
